kind = "mobile"
previewPath = "/"
title = "M Chat"
version = "1.0.0"
id = "artifacts/m-chat"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 23032

[services.development]
run = "pnpm --filter @workspace/m-chat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/m-chat", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/m-chat", "run", "serve" ]

[services.env]
PORT = "23032"
BASE_PATH = "/"
