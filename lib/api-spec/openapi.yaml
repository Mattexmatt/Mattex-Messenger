openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: M Chat API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: messages
    description: Chat messages
  - name: conversations
    description: Conversations
  - name: podcasts
    description: Podcast content
  - name: memes
    description: Meme community
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    put:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/search:
    get:
      operationId: searchUsers
      tags: [users]
      summary: Search users by username
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Users found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /conversations:
    get:
      operationId: getConversations
      tags: [conversations]
      summary: Get user conversations
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Conversations list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createConversation
      tags: [conversations]
      summary: Create or get conversation with user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationRequest"
      responses:
        "200":
          description: Conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{conversationId}/messages:
    get:
      operationId: getMessages
      tags: [messages]
      summary: Get messages for a conversation
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Messages list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /podcasts:
    get:
      operationId: getPodcasts
      tags: [podcasts]
      summary: Get podcast episodes
      responses:
        "200":
          description: Podcasts list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Podcast"
    post:
      operationId: createPodcast
      tags: [podcasts]
      summary: Create podcast episode (owner only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePodcastRequest"
      responses:
        "201":
          description: Podcast created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Podcast"

  /memes:
    get:
      operationId: getMemes
      tags: [memes]
      summary: Get meme posts
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Memes list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Meme"
    post:
      operationId: createMeme
      tags: [memes]
      summary: Post a meme
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemeRequest"
      responses:
        "201":
          description: Meme created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Meme"

  /memes/{memeId}/like:
    post:
      operationId: likeMeme
      tags: [memes]
      summary: Like or unlike a meme
      security:
        - bearerAuth: []
      parameters:
        - name: memeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Like status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LikeResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    RegisterRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
      required:
        - username
        - password
        - displayName

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
        isOwner:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - username
        - displayName
        - isOwner
        - createdAt

    UpdateUserRequest:
      type: object
      properties:
        displayName:
          type: string
        avatarUrl:
          type: string

    Conversation:
      type: object
      properties:
        id:
          type: integer
        otherUser:
          $ref: "#/components/schemas/User"
        lastMessage:
          $ref: "#/components/schemas/Message"
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - otherUser
        - updatedAt

    CreateConversationRequest:
      type: object
      properties:
        otherUserId:
          type: integer
      required:
        - otherUserId

    Message:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        senderId:
          type: integer
        content:
          type: string
        type:
          type: string
          enum: [text, audio, image]
        createdAt:
          type: string
          format: date-time
        sender:
          $ref: "#/components/schemas/User"
      required:
        - id
        - conversationId
        - senderId
        - content
        - type
        - createdAt

    SendMessageRequest:
      type: object
      properties:
        content:
          type: string
        type:
          type: string
          enum: [text, audio, image]
      required:
        - content
        - type

    Podcast:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        audioUrl:
          type: string
        thumbnailUrl:
          type: string
        duration:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - audioUrl
        - createdAt

    CreatePodcastRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        audioUrl:
          type: string
        thumbnailUrl:
          type: string
        duration:
          type: integer
      required:
        - title
        - audioUrl

    Meme:
      type: object
      properties:
        id:
          type: integer
        imageUrl:
          type: string
        caption:
          type: string
        likesCount:
          type: integer
        isLiked:
          type: boolean
        author:
          $ref: "#/components/schemas/User"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - imageUrl
        - likesCount
        - isLiked
        - createdAt

    CreateMemeRequest:
      type: object
      properties:
        imageUrl:
          type: string
        caption:
          type: string
      required:
        - imageUrl

    LikeResponse:
      type: object
      properties:
        liked:
          type: boolean
        likesCount:
          type: integer
      required:
        - liked
        - likesCount
